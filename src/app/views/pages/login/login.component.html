<div class="login-container">
  <!-- Background -->
  <div class="bg"></div>
  <div class="grain"></div>

 

  <!-- Left branding -->
  <div class="brand-panel">
    <div class="brand-name" style="font-family: DM Serif Display;">Pizzeria<span></span><br>Colombianita</div>
    <div class="brand-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Card -->
  <div class="card-wrap">
    <div class="card">
      <div class="card-header">
        <p class="card-eyebrow">Bienvenido de vuelta</p>
        <h1 class="card-title">Inicia <em>sesión</em></h1>
      </div>

      <!-- Tabs -->
      <div class="tabs" id="tabs">
        <button class="tab-btn active">Iniciar sesión</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="panel active" id="login">
        <form (ngSubmit)="login()">
          <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" placeholder="tu@correo.com" [(ngModel)]="email" name="email" required autocomplete="username" />
            <span class="input-icon">✉</span>
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" placeholder="••••••••" [(ngModel)]="password" name="password" required autocomplete="current-password" />
            <span class="input-icon">🔒</span>
          </div>

          <div class="options-row">
            <label class="remember">
              <input type="checkbox" /> Recordarme
            </label>
            <a href="#" class="forgot">¿Olvidaste tu clave?</a>
          </div>

          <button class="btn-primary" type="submit">Entrar ahora →</button>
        </form>
      </div>
    </div>
  </div>
</div>
